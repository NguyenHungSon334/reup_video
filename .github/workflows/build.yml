name: Build Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  APP_VERSION: "2.0.10"

jobs:
  # ── Windows: backend EXE + Flutter desktop + Inno Setup ─────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Create credentials.json from secret
        run: '[System.IO.File]::WriteAllText("backend\credentials.json", $env:GDRIVE_CREDENTIALS_JSON, [System.Text.Encoding]::UTF8)'
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}

      - uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: "3.x"
          channel: stable

      - name: Build Flutter Windows desktop
        run: |
          cd flutter_ui
          flutter config --enable-windows-desktop
          flutter build windows --release

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install pyinstaller pillow
          pip install -r requirements.txt

      - name: Install Playwright Chromium (bundle into exe)
        run: playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: pw_browsers

      - name: Generate icon
        run: python assets/generate_icon.py

      - name: Build backend EXE
        run: pyinstaller reup.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          mkdir dist\installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - uses: actions/upload-artifact@v4.4.3
        with:
          name: ReupVideo-Windows-Installer
          path: dist\installer\Setup_ReupVideo_${{ env.APP_VERSION }}.exe

  # ── macOS: backend + Flutter macOS app + DMG ────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Create credentials.json from secret
        run: printf '%s' "$GDRIVE_CREDENTIALS_JSON" > backend/credentials.json
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}

      - uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: "3.x"
          channel: stable

      - name: Build Flutter macOS desktop
        run: |
          cd flutter_ui
          flutter config --enable-macos-desktop
          flutter create --platforms=macos . --project-name reup_flutter
          flutter build macos --release

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip3 install pyinstaller pillow
          pip3 install -r requirements.txt
          brew install create-dmg

      - name: Install Playwright Chromium (bundle into app)
        run: playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: pw_browsers

      - name: Generate icon
        run: python3 assets/generate_icon_mac.py

      - name: Build backend
        run: pyinstaller reup_mac.spec --noconfirm --clean

      - name: Package DMG
        run: |
          mkdir -p dist/dmg_staging/ReupVideo
          # Copy entire COLLECT directory — binary alone cannot run without support files
          cp -r dist/ReupVideo/. dist/dmg_staging/ReupVideo/
          mv dist/dmg_staging/ReupVideo/ReupVideo dist/dmg_staging/ReupVideo/ReupVideo-backend
          # pw_browsers copied here (not via spec — PyInstaller can't process Chromium .app)
          cp -r pw_browsers dist/dmg_staging/ReupVideo/pw_browsers
          cp -r "flutter_ui/build/macos/Build/Products/Release/reup_flutter.app" \
                dist/dmg_staging/ReupVideo/

          mkdir -p dist/installer_mac
          create-dmg \
            --volname "Reup Video" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 640 400 \
            --icon-size 100 \
            --icon "reup_flutter.app" 160 190 \
            --hide-extension "reup_flutter.app" \
            --app-drop-link 480 190 \
            "dist/installer_mac/ReupVideo_mac_${{ env.APP_VERSION }}.dmg" \
            "dist/dmg_staging/ReupVideo"

      - uses: actions/upload-artifact@v4.4.3
        with:
          name: ReupVideo-macOS-DMG
          path: dist/installer_mac/ReupVideo_mac_${{ env.APP_VERSION }}.dmg

  # ── GitHub Release ───────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4.1.8
        with: { name: ReupVideo-Windows-Installer, path: artifacts/ }

      - uses: actions/download-artifact@v4.1.8
        with: { name: ReupVideo-macOS-DMG, path: artifacts/ }

      - uses: softprops/action-gh-release@v2.1.0
        with:
          files: |
            artifacts/Setup_ReupVideo_${{ env.APP_VERSION }}.exe
            artifacts/ReupVideo_mac_${{ env.APP_VERSION }}.dmg
          generate_release_notes: true
