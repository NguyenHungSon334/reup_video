name: Build Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# APP_VERSION below is only a fallback for manual workflow_dispatch runs.
# Tag pushes (v*) override it from the tag in each job's "Resolve version" step,
# so the git tag is the single source of truth for the release version.
env:
  APP_VERSION: "2.1.23"

jobs:
  # ── Windows: backend EXE + Flutter desktop + Inno Setup ─────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Resolve version from tag
        run: |
          $ref = "${{ github.ref_name }}"
          $v = if ($ref -match '^v\d') { $ref.TrimStart('v') } else { "${{ env.APP_VERSION }}" }
          echo "APP_VERSION=$v" >> $env:GITHUB_ENV
          (Get-Content flutter_ui/pubspec.yaml) -replace '^version: .*', "version: $v+1" | Set-Content flutter_ui/pubspec.yaml
          (Get-Content setup.iss) -replace '#define AppVersion .*', "#define AppVersion `"$v`"" | Set-Content setup.iss
          $t = ($v -split '\.') -join ', '
          (Get-Content version_info.txt) `
            -replace 'filevers=\([^)]*\)', "filevers=($t, 0)" `
            -replace 'prodvers=\([^)]*\)', "prodvers=($t, 0)" `
            -replace "u'\d+\.\d+\.\d+'", "u'$v'" | Set-Content version_info.txt

      - name: Create credentials.json from secret
        run: '[System.IO.File]::WriteAllText("backend\credentials.json", $env:GDRIVE_CREDENTIALS_JSON, [System.Text.Encoding]::UTF8)'
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}

      - uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: "3.x"
          channel: stable

      - name: Build Flutter Windows desktop
        run: |
          cd flutter_ui
          flutter config --enable-windows-desktop
          flutter build windows --release

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install pyinstaller pillow
          pip install -r requirements.txt

      - name: Install Playwright Chromium (bundle into exe)
        run: playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: pw_browsers

      - name: Generate icon
        run: python assets/generate_icon.py

      - name: Build backend EXE
        run: pyinstaller reup.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          mkdir dist\installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - uses: actions/upload-artifact@v4.4.3
        with:
          name: ReupVideo-Windows-Installer
          path: dist\installer\Setup_ReupVideo_${{ env.APP_VERSION }}.exe

  # ── macOS: backend + Flutter macOS app + DMG ────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Resolve version from tag
        run: |
          ref="${{ github.ref_name }}"
          if [[ "$ref" =~ ^v[0-9] ]]; then v="${ref#v}"; else v="${{ env.APP_VERSION }}"; fi
          echo "APP_VERSION=$v" >> "$GITHUB_ENV"
          sed -i '' "s/^version: .*/version: ${v}+1/" flutter_ui/pubspec.yaml

      - name: Create credentials.json from secret
        run: printf '%s' "$GDRIVE_CREDENTIALS_JSON" > backend/credentials.json
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}

      - uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: "3.x"
          channel: stable

      - name: Build Flutter macOS desktop
        run: |
          cd flutter_ui
          flutter config --enable-macos-desktop
          flutter create --platforms=macos . --project-name reup_flutter
          # Allow Flutter to reach backend on localhost:8765 (blocked by App Sandbox by default)
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" macos/Runner/Release.entitlements
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" macos/Runner/DebugProfile.entitlements
          flutter build macos --release

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip3 install pyinstaller pillow
          pip3 install -r requirements.txt
          brew install create-dmg

      - name: Install Playwright Chromium (bundle into app)
        run: playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: pw_browsers

      - name: Generate icon
        run: python3 assets/generate_icon_mac.py

      - name: Build backend
        run: pyinstaller reup_mac.spec --noconfirm --clean

      - name: Package DMG
        run: |
          # Use PyInstaller's own bundle (correct Frameworks/Python layout) as base
          mkdir -p dist/dmg_staging
          cp -r dist/ReupVideo.app "dist/dmg_staging/Reup Video.app"

          MACOS="dist/dmg_staging/Reup Video.app/Contents/MacOS"
          RESOURCES="dist/dmg_staging/Reup Video.app/Contents/Resources"

          # Rename main executable
          mv "$MACOS/ReupVideo" "$MACOS/ReupVideo-backend"

          # Flutter UI → Contents/Resources/ (correct bundle layout)
          cp -r "flutter_ui/build/macos/Build/Products/Release/reup_flutter.app" "$RESOURCES/"

          # Playwright browsers → Contents/Resources/ (PyInstaller can't process Chromium .app)
          cp -r pw_browsers "$RESOURCES/pw_browsers"

          # Replace PyInstaller Info.plist with ours
          sed "s/APP_VERSION_PLACEHOLDER/${{ env.APP_VERSION }}/g" \
            assets/macos/Info.plist \
            > "dist/dmg_staging/Reup Video.app/Contents/Info.plist"

          cp assets/icon.icns "$RESOURCES/icon.icns"

          # Install.command: the primary install path. The app is unsigned (no paid
          # Apple cert), so ad-hoc signing this merged PyInstaller+Flutter bundle is
          # unreliable and quarantine would still make a dragged app show "damaged".
          # Instead the user double-clicks Install.command, which copies the app to
          # /Applications and runs `xattr -cr` to clear quarantine → opens cleanly.
          cp assets/macos/Install.command "dist/dmg_staging/Install.command"
          chmod +x "dist/dmg_staging/Install.command"

          mkdir -p dist/installer_mac
          create-dmg \
            --volname "Reup Video" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 660 450 \
            --icon-size 100 \
            --icon "Reup Video.app" 160 200 \
            --hide-extension "Reup Video.app" \
            --app-drop-link 500 200 \
            --icon "Install.command" 160 350 \
            "dist/installer_mac/ReupVideo_mac_${{ env.APP_VERSION }}.dmg" \
            "dist/dmg_staging"

      - uses: actions/upload-artifact@v4.4.3
        with:
          name: ReupVideo-macOS-DMG
          path: dist/installer_mac/ReupVideo_mac_${{ env.APP_VERSION }}.dmg

  # ── GitHub Release ───────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4.1.8
        with: { name: ReupVideo-Windows-Installer, path: artifacts/ }

      - uses: actions/download-artifact@v4.1.8
        with: { name: ReupVideo-macOS-DMG, path: artifacts/ }

      - uses: softprops/action-gh-release@v2.1.0
        with:
          files: |
            artifacts/Setup_ReupVideo_${{ env.APP_VERSION }}.exe
            artifacts/ReupVideo_mac_${{ env.APP_VERSION }}.dmg
          generate_release_notes: true
