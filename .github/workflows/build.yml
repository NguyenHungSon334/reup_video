name: Build Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ── Windows: backend EXE + Flutter desktop + Inno Setup ─────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable

      - name: Build Flutter Windows desktop
        run: |
          cd flutter_ui
          flutter config --enable-windows-desktop
          flutter build windows --release

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install pyinstaller pillow
          pip install -r requirements.txt

      - name: Generate icon
        run: python assets/generate_icon.py

      - name: Build backend EXE
        run: pyinstaller reup.spec --noconfirm --clean

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          mkdir dist\installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ReupVideo-Windows-Installer
          path: dist\installer\Setup_ReupVideo_1.0.0.exe

  # ── macOS: backend + Flutter macOS app + DMG ────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable

      - name: Build Flutter macOS desktop
        run: |
          cd flutter_ui
          flutter config --enable-macos-desktop
          flutter build macos --release

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip3 install pyinstaller pillow
          pip3 install -r requirements.txt
          brew install create-dmg

      - name: Generate icon
        run: python3 assets/generate_icon_mac.py

      - name: Build backend
        run: pyinstaller reup_mac.spec --noconfirm --clean

      - name: Package DMG
        run: |
          mkdir -p dist/dmg_staging/ReupVideo
          cp dist/ReupVideo dist/dmg_staging/ReupVideo/ReupVideo-backend
          cp -r "flutter_ui/build/macos/Build/Products/Release/reup_flutter.app" \
                dist/dmg_staging/ReupVideo/

          mkdir -p dist/installer_mac
          create-dmg \
            --volname "Reup Video" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 640 400 \
            --icon-size 100 \
            --icon "reup_flutter.app" 160 190 \
            --hide-extension "reup_flutter.app" \
            --app-drop-link 480 190 \
            "dist/installer_mac/ReupVideo_mac_1.0.0.dmg" \
            "dist/dmg_staging/ReupVideo"

      - uses: actions/upload-artifact@v4
        with:
          name: ReupVideo-macOS-DMG
          path: dist/installer_mac/ReupVideo_mac_1.0.0.dmg

  # ── GitHub Release ───────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { name: ReupVideo-Windows-Installer, path: artifacts/ }

      - uses: actions/download-artifact@v4
        with: { name: ReupVideo-macOS-DMG, path: artifacts/ }

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Setup_ReupVideo_1.0.0.exe
            artifacts/ReupVideo_mac_1.0.0.dmg
          generate_release_notes: true
